<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Jimmy logo: stylized "J" formed by connected neuron nodes -->
  <!-- Main J stroke -->
  <path d="M28 8 L28 32 Q28 40 20 40 Q12 40 12 32" stroke="#6c8aff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Neural connection lines -->
  <line x1="28" y1="12" x2="36" y2="8" stroke="#6c8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="20" x2="38" y2="18" stroke="#6c8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="28" y1="12" x2="20" y2="8" stroke="#6c8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="40" x2="14" y2="44" stroke="#6c8aff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Neuron nodes -->
  <circle cx="28" cy="8" r="3" fill="#6c8aff"/>
  <circle cx="28" cy="20" r="2.5" fill="#6c8aff" opacity="0.7"/>
  <circle cx="20" cy="40" r="2.5" fill="#6c8aff" opacity="0.8"/>
  <circle cx="12" cy="32" r="2" fill="#6c8aff" opacity="0.6"/>
  <!-- Satellite nodes -->
  <circle cx="36" cy="8" r="1.5" fill="#6c8aff" opacity="0.4"/>
  <circle cx="38" cy="18" r="1.5" fill="#6c8aff" opacity="0.35"/>
  <circle cx="20" cy="8" r="1.5" fill="#6c8aff" opacity="0.35"/>
  <circle cx="14" cy="44" r="1.5" fill="#6c8aff" opacity="0.3"/>
</svg>
