              <span style="font-size:13px;font-weight:600;">${triaged} of ${total} triaged</span>
              <span style="font-size:12px;color:var(--text-3);">${pct}%</span>
            </div>
            <div style="height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin-bottom:12px;">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg, var(--accent), #34c759);border-radius:4px;transition:width .4s;"></div>
            </div>
            <div style="display:flex;gap:16px;font-size:12px;color:var(--text-2);">
              <span>* ${starred} starred</span>
              <span>${d.dismissed||0} dismissed</span>
              <span>${total - triaged} remaining</span>
            </div>
          </div>
        </div>`;
      })()}
      ${importHtml}
      <div style="display:flex;justify-content:center;gap:10px;">
        <button onclick="_netStartTriage()" style="padding:10px 24px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .12s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Triage Contacts</button>
        <button onclick="_netShowList()" style="padding:10px 24px;border:1px solid var(--border-mid);border-radius:10px;background:var(--surface);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='var(--surface)'">Browse All</button>
      </div>
    </div>`;
}

// ── LIST VIEW ──────────────────────────────────────────────────────────
async function _netShowList() {
  _netView = 'list';
  _netFilters = { q:'', aff:'', region:'', company:'', source:'', min_closeness:0, sort:'closeness' };
  await _netFetchList();
}

function _netSegmentClick(warmth) {
  _netView = 'list';
  const staleMap = { hot:0, warm:30, cooling:90, cold:180, never:0 };
  _netFilters = { q:'', aff:'', region:'', company:'', source:'', min_closeness:0, sort:'staleness' };
  if (warmth === 'never') {
    _netFilters.never_contacted = true;
  } else {
    _netFilters.stale_days = staleMap[warmth] || 0;
  }
  _netFetchList();
}

function _netSegmentFilter(filter) {
  _netView = 'list';
  _netFilters = { q:'', aff:'', region:'', company:'', source:'', min_closeness:0, sort:'closeness', ...filter };
  _netFetchList();
}

async function _netFetchList() {
  $('content').innerHTML = `<div style="padding:32px 24px;">${loading('Loading contacts…')}</div>`;
  const f = _netFilters;
  const params = new URLSearchParams();
  if (f.q) params.set('q', f.q);
  if (f.aff) params.set('affiliations', f.aff);
  if (f.region) params.set('region', f.region);
  if (f.company) params.set('company', f.company);
  if (f.source) params.set('source', f.source);
  if (f.min_closeness > 0) params.set('min_closeness', f.min_closeness);
  if (f.stale_days > 0) params.set('stale_days', f.stale_days);
  if (f.industry) params.set('industry', f.industry);
  if (f.missing_info) params.set('missing_info', 'true');
  if (f.never_contacted) params.set('never_contacted', 'true');
  if (f.starred) params.set('starred', '1');
  if (f.sort) params.set('sort', f.sort);
  params.set('limit', '500');

  try {
    if (!_netAffs.length) {
      const ar = await api('/contacts/meta/affiliations');
      _netAffs = ar.affiliations || [];
    }
    const resp = await api('/contacts?' + params.toString());
    _netContacts = resp.contacts || [];
    _netScrollLoaded = _NET_BATCH;
    setTopbar('Network', `${_netContacts.length} contacts`);
    _renderNetList();
  } catch(e) {
    $('content').innerHTML = `<div style="padding:32px 24px;">${alertHtml('Failed to load contacts','error')}</div>`;
  }
}

function _renderNetList() {
  const f = _netFilters;
  const visible = _netContacts.slice(0, _netScrollLoaded);

  // Active filter chips
  const chips = [];
  if (f.aff) chips.push({label:f.aff, clear:()=>{_netFilters.aff='';_netFetchList();}});
  if (f.region) chips.push({label:f.region, clear:()=>{_netFilters.region='';_netFetchList();}});
  if (f.source) chips.push({label:_sourceLabel(f.source), clear:()=>{_netFilters.source='';_netFetchList();}});
  if (f.min_closeness>0) chips.push({label:'Closeness ≥'+f.min_closeness, clear:()=>{_netFilters.min_closeness=0;_netFetchList();}});
  if (f.stale_days>0) chips.push({label:'Stale '+f.stale_days+'d+', clear:()=>{delete _netFilters.stale_days;_netFetchList();}});
  if (f.industry) chips.push({label:f.industry, clear:()=>{_netFilters.industry='';_netFetchList();}});

  const chipsHtml = chips.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
    ${chips.map((ch,i) => `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:500;">${esc(ch.label)}<span onclick="event.stopPropagation();(_netChipClear[${i}])()" style="cursor:pointer;font-size:13px;line-height:1;">×</span></span>`).join('')}
    <span onclick="_netFilters={q:'',aff:'',region:'',company:'',source:'',min_closeness:0,sort:'closeness'};_netFetchList()" style="font-size:11px;color:var(--text-3);cursor:pointer;padding:4px 8px;">Clear all</span>
  </div>` : '';
  // Store chip clear functions globally
  window._netChipClear = chips.map(c => c.clear);

  // Quick filter pills
  const pills = [
    {label:'All', active:!f.min_closeness&&!f.aff&&!f.starred, click:'_netFilters={q:"",aff:"",region:"",company:"",source:"",min_closeness:0,sort:"closeness"};_netFetchList()'},
    {label:'★ Starred', active:!!f.starred, click:'_netFilters.starred=f.starred?undefined:1;_netFetchList()'},
    {label:'Close (3+)', active:f.min_closeness>=3, click:'_netFilters.min_closeness=3;_netFetchList()'},
    {label:'Inner (4+)', active:f.min_closeness>=4, click:'_netFilters.min_closeness=4;_netFetchList()'},
  ];
  // Add top affiliations as pills
  ['FIJI','Columbia','family'].forEach(a => {
    if (_netAffs.includes(a)) pills.push({label:a, active:f.aff===a, click:`_netFilters.aff='${a}';_netFetchList()`});
  });

  const pillStyle = (active) => `padding:5px 14px;border-radius:20px;border:1px solid ${active?'var(--accent)':'var(--border-mid)'};background:${active?'var(--accent-dim)':'var(--surface)'};color:${active?'var(--accent)':'var(--text-2)'};font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .12s;`;

  const filterBar = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button onclick="_netView='dashboard';renderNetwork()" style="background:none;border:none;color:var(--accent);font-family:var(--font);font-size:13px;cursor:pointer;padding:0;margin-right:4px;">← Dashboard</button>
      <input id="net-search" type="text" placeholder="Search…" value="${esc(f.q||'')}"
        oninput="_netFilters.q=this.value;_netDebounceSearch()"
        style="flex:1;min-width:140px;padding:7px 12px;border:1px solid var(--border-mid);border-radius:9px;background:var(--surface);font-family:var(--font);font-size:13px;outline:none;">
      <select onchange="_netFilters.sort=this.value;_netFetchList()"
        style="padding:6px 8px;border:1px solid var(--border-mid);border-radius:9px;background:var(--surface);font-family:var(--font);font-size:12px;cursor:pointer;">
        <option value="closeness" ${f.sort==='closeness'?'selected':''}>Closeness</option>
        <option value="last_contact" ${f.sort==='last_contact'?'selected':''}>Last Contact</option>
        <option value="name" ${f.sort==='name'?'selected':''}>Name</option>
        <option value="recent" ${f.sort==='recent'?'selected':''}>Recently Added</option>
        <option value="staleness" ${f.sort==='staleness'?'selected':''}>Most Stale</option>
      </select>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;overflow-x:auto;">
      ${pills.map(p => `<button onclick="${p.click}" style="${pillStyle(p.active)}">${p.label}</button>`).join('')}
      <select onchange="if(this.value){_netFilters.aff=this.value;_netFetchList()};this.selectedIndex=0"
        style="padding:5px 10px;border:1px solid var(--border-mid);border-radius:20px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--text-2);">
        <option value="">+ Community</option>
        ${_netAffs.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')}
      </select>
    </div>`;

  // Contact rows with warmth-colored left border and hover quick actions
  const rowsHtml = visible.length ? visible.map(c => {
    const wl = _warmthLabel(c.warmth_last_contact);
    const wc = _warmthColor(c.warmth_last_contact);
    const qa = [];
    if (c.email) qa.push(`<a href="mailto:${esc(c.email)}" onclick="event.stopPropagation()" title="Email" style="width:26px;height:26px;border:1px solid var(--border-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:11px;color:var(--text-2);background:var(--surface);transition:all .1s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border-mid)';this.style.color='var(--text-2)'">@</a>`);
    if (c.linkedin_url) qa.push(`<a href="${esc(c.linkedin_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="LinkedIn" style="width:26px;height:26px;border:1px solid var(--border-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:10px;color:var(--text-2);background:var(--surface);font-weight:600;transition:all .1s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border-mid)';this.style.color='var(--text-2)'">in</a>`);
    return `<div class="net-row" onclick="_netOpenDrawer(${c.id})" style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);border-left:3px solid ${wc};cursor:pointer;transition:background .1s;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='transparent'">
      ${_avatar(c, 38)}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.first_name||'')} ${esc(c.last_name||'')}</span>
          ${c.starred===1?'<span style="color:var(--accent);font-size:11px;flex-shrink:0;">*</span>':''}
        </div>
        <div style="font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.role?esc(c.role):''}${c.role&&c.company?' at ':''}${c.company?esc(c.company):''}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:140px;">
        ${(c.affiliations||[]).slice(0,2).map(a => `<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:500;white-space:nowrap;">${esc(a)}</span>`).join('')}
        ${(c.affiliations||[]).length>2?`<span style="font-size:10px;color:var(--text-3);">+${c.affiliations.length-2}</span>`:''}
      </div>
      ${qa.length ? `<div class="net-row-actions" style="display:none;gap:4px;flex-shrink:0;">${qa.join('')}</div>` : ''}
      <div class="net-row-meta" style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <div style="width:46px;text-align:center;">${_closeDots(c.closeness||0)}</div>
        ${wl ? `<div style="font-size:10.5px;color:${wc};font-weight:500;width:44px;text-align:right;">${wl}</div>` : '<div style="width:44px;"></div>'}
      </div>
    </div>`;
  }).join('') : '<div style="padding:32px;text-align:center;color:var(--text-3);font-size:13.5px;">No contacts match your filters.</div>';

  $('content').innerHTML = `
    <style>
      .net-row:hover .net-row-actions { display:flex !important; }
      .net-row:hover .net-row-meta { display:none !important; }
    </style>
    <div style="max-width:800px;margin:0 auto;padding:20px 20px 60px;" class="fade-up">
      ${filterBar}
      ${chipsHtml}
      <div style="font-size:11px;color:var(--text-3);margin-bottom:8px;">${_netContacts.length} contacts${_netScrollLoaded < _netContacts.length ? ' (showing '+_netScrollLoaded+')' : ''}</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
        ${rowsHtml}
      </div>
      ${_netScrollLoaded < _netContacts.length ? '<div id="net-scroll-sentinel" style="height:1px;"></div>' : ''}
    </div>`;

  // Infinite scroll via IntersectionObserver
  if (_netScrollLoaded < _netContacts.length) {
    const sentinel = document.getElementById('net-scroll-sentinel');
    if (sentinel) {
      const obs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          obs.disconnect();
          _netScrollLoaded += _NET_BATCH;
          _renderNetList();
        }
      }, {rootMargin: '300px'});
      obs.observe(sentinel);
    }
  }
}

let _netSearchTimer = null;
function _netDebounceSearch() {
  clearTimeout(_netSearchTimer);
  _netSearchTimer = setTimeout(() => _netFetchList(), 300);
}

      <div style="margin-bottom:20px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">Timeline</div>
        ${timelineHtml}
      </div>

      <!-- Contact Info (editable) -->
      <div style="background:var(--surface-2);border-radius:12px;padding:14px;margin-bottom:16px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">Contact Info <span style="font-weight:400;text-transform:none;letter-spacing:0;">- click to edit</span></div>
        ${editableField('Email', 'email', c.email)}
        ${editableField('Phone', 'phone', c.phone)}
        ${editableField('LinkedIn', 'linkedin_url', c.linkedin_url)}
        ${editableField('Company', 'company', c.company)}
        ${editableField('Role', 'role', c.role)}
        ${field('Location', [c.city,c.region].filter(Boolean).join(' / '))}
        ${field('Industry', [c.industry,c.sub_industry].filter(Boolean).join(' / '))}
        ${field('Source', _sourceLabel(c.source))}
        ${editableField('Notes', 'notes', c.notes)}
      </div>

      <!-- Communities -->
      <div style="margin-bottom:20px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;">Communities</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${(c.affiliations||[]).map(a => `<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:500;">${esc(a)}</span>`).join('')}
          ${!(c.affiliations||[]).length ? '<span style="font-size:12px;color:var(--text-3);">None</span>' : ''}
        </div>
      </div>

      <!-- Delete -->
      <div style="text-align:center;padding-top:12px;border-top:1px solid var(--border);">
        <button onclick="_netDeleteContact(${c.id})" style="background:none;border:none;color:var(--danger);font-family:var(--font);font-size:12px;cursor:pointer;opacity:0.6;transition:opacity .12s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">Delete Contact</button>
      </div>
    </div>`;

  drawer.classList.add('open');
}

async function _netAddInteraction(contactId) {
  const type = $('net-note-type').value;
  const body = $('net-note-body').value.trim();
  const dt = $('net-note-date').value;
  if (!body && type === 'note') return;
  await fetch(`/contacts/${contactId}/interactions`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type, body, interaction_date: dt})
  });
  _netOpenDrawer(contactId);
}

async function _netDeleteInteraction(intId, contactId) {
  await fetch(`/contacts/interactions/${intId}`, {method:'DELETE'});
  _netOpenDrawer(contactId);
}

async function _netToggleStar(id, val) {
  await fetch(`/contacts/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({starred:val})});
  _netOpenDrawer(id);
}

async function _netSetCloseness(id, val) {
  await fetch(`/contacts/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({closeness:val})});
  _netOpenDrawer(id);
}

let _netInlineTimer = null;
async function _netInlineEdit(id, field, newVal) {
  clearTimeout(_netInlineTimer);
  _netInlineTimer = setTimeout(async () => {
    const trimmed = (newVal||'').trim();
    await fetch(`/contacts/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({[field]: trimmed})
    });
  }, 500);
}

async function _netDeleteContact(id) {
  if (!confirm('Delete this contact?')) return;
  await fetch(`/contacts/${id}`, {method:'DELETE'});
  closeDrawer();
  if (_netView === 'list') _netFetchList();
  else renderNetwork();
}

async function _netImport(type, input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  input.value = '';
  try {
    const r = await fetch(`/contacts/import/${type}`, {method:'POST', body:formData});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Import failed');
    alert(`Imported ${d.imported||d.count||0} contacts`);
    renderNetwork();
  } catch(e) { alert('Import error: '+e.message); }
}

// ── TRIAGE UI ──────────────────────────────────────────────────────────
let _triageBatch = [], _triageIdx = 0, _triageOffset = 0, _triageRemaining = 0;
let _triageStats = { starred: 0, skipped: 0, dismissed: 0 };

async function _netStartTriage() {
  _netView = 'triage';
  _triageOffset = 0;
  _triageStats = { starred: 0, skipped: 0, dismissed: 0 };
  // First recalc closeness scores
  $('content').innerHTML = `<div style="padding:32px 24px;">${loading('Recalculating closeness scores…')}</div>`;
  await fetch('/contacts/recalc-closeness', {method:'POST'});
  await _triageLoadBatch();
}

async function _triageLoadBatch() {
  const resp = await api(`/contacts/triage?offset=${_triageOffset}&limit=20`);
  _triageBatch = resp.contacts || [];
  _triageRemaining = resp.remaining || 0;
  _triageIdx = 0;
  if (!_triageBatch.length) {
    _triageDone();
    return;
  }
  _renderTriageCard();
}

function _renderTriageCard() {
  if (_triageIdx >= _triageBatch.length) {
    _triageOffset += _triageBatch.length;
    _triageLoadBatch();
    return;
  }
  const c = _triageBatch[_triageIdx];
  const progress = _triageStats.starred + _triageStats.skipped + _triageStats.dismissed;
  const remaining = _triageRemaining - progress;
  const pctDone = Math.round(progress / Math.max(_triageRemaining, 1) * 100);
  const wl = _warmthLabel(c.warmth_last_contact);

  setTopbar('Triage', `${progress} of ${_triageRemaining} triaged`);

  const infoRows = [];
  if (c.role || c.company) infoRows.push(`<div style="font-size:14.5px;color:var(--text-2);margin-bottom:4px;">${c.role?esc(c.role):''}${c.role&&c.company?' at ':''}${c.company?esc(c.company):''}</div>`);
  if (c.industry) infoRows.push(`<div style="font-size:12.5px;color:var(--text-3);margin-bottom:4px;">${esc(c.industry)}${c.sub_industry?' / '+esc(c.sub_industry):''}</div>`);
  if (c.city || c.region) infoRows.push(`<div style="font-size:12.5px;color:var(--text-3);margin-bottom:4px;">${esc([c.city,c.region].filter(Boolean).join(', '))}</div>`);

  $('content').innerHTML = `
    <div style="max-width:520px;margin:0 auto;padding:32px 24px;" class="fade-up">
      <!-- Toast -->
      <div id="triage-toast" style="position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;font-family:var(--font);pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:999;"></div>

      <!-- Progress -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
        <button onclick="renderNetwork()" style="background:none;border:none;color:var(--accent);font-family:var(--font);font-size:13px;cursor:pointer;padding:0;flex-shrink:0;">Done</button>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:11px;color:var(--text-2);font-weight:600;">${progress} triaged</span>
            <span style="font-size:11px;color:var(--text-3);">${remaining} left</span>
          </div>
          <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pctDone}%;background:linear-gradient(90deg, var(--accent), #34c759);border-radius:3px;transition:width .3s;"></div>
          </div>
        </div>
        <div style="display:flex;gap:8px;font-size:11px;color:var(--text-3);flex-shrink:0;">
          <span style="color:var(--accent);">* ${_triageStats.starred}</span>
          <span>${_triageStats.dismissed}d</span>
        </div>
      </div>

      <!-- Card -->
      <div id="triage-card" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px 28px;text-align:center;margin-bottom:24px;transition:transform .2s,opacity .2s;">
        <div style="margin-bottom:18px;">${_avatar(c, 80)}</div>
        <div style="font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px;">${esc(c.first_name||'')} ${esc(c.last_name||'')}</div>
        ${infoRows.join('')}
        ${(c.affiliations||[]).length ? `<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px;">${c.affiliations.map(a => `<span style="font-size:11.5px;padding:4px 12px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:500;">${esc(a)}</span>`).join('')}</div>` : ''}
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          ${c.email ? `<span style="font-size:11px;padding:4px 10px;border-radius:16px;background:var(--surface-2);color:var(--text-2);">@ Email</span>` : ''}
          ${c.phone ? `<span style="font-size:11px;padding:4px 10px;border-radius:16px;background:var(--surface-2);color:var(--text-2);">Phone</span>` : ''}
          ${c.linkedin_url ? `<span style="font-size:11px;padding:4px 10px;border-radius:16px;background:var(--surface-2);color:var(--text-2);">LinkedIn</span>` : ''}
          ${wl ? `<span style="font-size:11px;padding:4px 10px;border-radius:16px;background:var(--surface-2);color:${_warmthColor(c.warmth_last_contact)};font-weight:500;">Last: ${wl}</span>` : ''}
          ${c.source ? `<span style="font-size:11px;padding:4px 10px;border-radius:16px;background:var(--surface-2);color:var(--text-3);">via ${_sourceLabel(c.source)}</span>` : ''}
        </div>
        ${c.notes ? `<div style="font-size:12.5px;color:var(--text-2);margin-top:14px;font-style:italic;line-height:1.5;max-width:360px;margin-left:auto;margin-right:auto;">"${esc(c.notes)}"</div>` : ''}
        <div style="margin-top:12px;">${_closeDots(c.closeness||0, 10)}</div>
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:14px;justify-content:center;margin-bottom:20px;">
        <div style="text-align:center;">
          <button onclick="_triageAct('dismiss')" style="width:64px;height:64px;border-radius:50%;border:2px solid var(--border-mid);background:var(--surface);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;" onmouseover="this.style.borderColor='var(--danger)';this.style.background='rgba(255,59,48,0.06)';this.style.transform='scale(1.08)'" onmouseout="this.style.borderColor='var(--border-mid)';this.style.background='var(--surface)';this.style.transform='scale(1)'" title="Not important">X</button>
          <div style="font-size:10px;color:var(--text-3);margin-top:6px;">Dismiss</div>
        </div>
        <div style="text-align:center;">
          <button onclick="_triageAct('skip')" style="width:64px;height:64px;border-radius:50%;border:2px solid var(--border-mid);background:var(--surface);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;" onmouseover="this.style.borderColor='var(--warning)';this.style.transform='scale(1.08)'" onmouseout="this.style.borderColor='var(--border-mid)';this.style.transform='scale(1)'" title="Skip for now">-></button>
          <div style="font-size:10px;color:var(--text-3);margin-top:6px;">Skip</div>
        </div>
        <div style="text-align:center;">
          <button onclick="_triageAct('star')" style="width:64px;height:64px;border-radius:50%;border:2px solid var(--accent);background:var(--accent-dim);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;" onmouseover="this.style.background='var(--accent)';this.style.color='#fff';this.style.transform='scale(1.08)'" onmouseout="this.style.background='var(--accent-dim)';this.style.color='';this.style.transform='scale(1)'" title="Star this person">*</button>
          <div style="font-size:10px;color:var(--text-3);margin-top:6px;">Star</div>
        </div>
      </div>

      <!-- Keyboard hints -->
      <div style="display:flex;justify-content:center;gap:16px;padding:14px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--text-3);">
        <span><kbd style="padding:2px 7px;border:1px solid var(--border-mid);border-radius:4px;font-family:var(--mono);font-size:10px;background:var(--surface-2);">LEFT</kbd> dismiss</span>
        <span><kbd style="padding:2px 7px;border:1px solid var(--border-mid);border-radius:4px;font-family:var(--mono);font-size:10px;background:var(--surface-2);">RIGHT</kbd> skip</span>
        <span><kbd style="padding:2px 7px;border:1px solid var(--border-mid);border-radius:4px;font-family:var(--mono);font-size:10px;background:var(--surface-2);">UP</kbd> star</span>
      </div>
    </div>`;

  // Keyboard shortcuts
  document.onkeydown = _triageKey;
}

function _triageKey(e) {
  if (_netView !== 'triage') { document.onkeydown = null; return; }
  if (e.key === 'ArrowLeft') { e.preventDefault(); _triageAct('dismiss'); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); _triageAct('skip'); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); _triageAct('star'); }
}

async function _triageAct(action) {
  const c = _triageBatch[_triageIdx];
  if (!c) return;

  // Toast feedback
  const toast = document.getElementById('triage-toast');
  if (toast) {
    const msgs = {star: {text:'* Starred ' + (c.first_name||''), bg:'var(--accent)', color:'#fff'},
                  dismiss: {text:'Dismissed', bg:'var(--surface-2)', color:'var(--text-3)'},
                  skip: {text:'Skipped', bg:'var(--surface-2)', color:'var(--text-3)'}};
    const m = msgs[action];
    toast.textContent = m.text;
    toast.style.background = m.bg;
    toast.style.color = m.color;
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => { toast.style.opacity='0'; toast.style.transform='translateX(-50%) translateY(-20px)'; }, 1200);
  }

  // Card exit animation
  const card = document.getElementById('triage-card');
  if (card) {
    const dir = action==='star'?'translateY(-30px)':action==='dismiss'?'translateX(-40px)':'translateX(40px)';
    card.style.transform = dir;
    card.style.opacity = '0';
  }

  if (action === 'star') {
    await fetch(`/contacts/${c.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({starred:1})});
    _triageStats.starred++;
  } else if (action === 'dismiss') {
    await fetch(`/contacts/${c.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({closeness:0, starred:-1})});
    _triageStats.dismissed++;
  } else {
    _triageStats.skipped++;
  }

  _triageIdx++;
  setTimeout(() => _renderTriageCard(), 150);
}

function _triageDone() {
  document.onkeydown = null;
  $('content').innerHTML = `
    <div style="max-width:480px;margin:0 auto;padding:60px 24px;text-align:center;" class="fade-up">
      <div style="font-size:40px;margin-bottom:16px;">✓</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Triage Complete</div>
      <div style="font-size:14px;color:var(--text-2);margin-bottom:24px;line-height:1.5;">
        Starred ${_triageStats.starred} contacts · Dismissed ${_triageStats.dismissed} · Skipped ${_triageStats.skipped}
      </div>
      <button onclick="renderNetwork()" style="padding:10px 24px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;">Back to Dashboard</button>
    </div>`;
}

let _onboardStep = 0;

function renderOnboarding() {
  setActive('ask');
  $('topbar-title').textContent = 'Welcome to Jimmy';
  $('topbar-meta').textContent = '';
  hideInput();

  $('content').innerHTML = `
    <div style="max-width:580px;margin:0 auto;padding:48px 28px 60px;" class="fade-up">

      <!-- Logo + headline -->
      <div style="text-align:center;margin-bottom:40px;">
        <div style="width:52px;height:52px;background:var(--text);border-radius:14px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;">
          <span style="color:#fff;font-size:24px;font-weight:700;letter-spacing:-1px;">N</span>
        </div>
        <div style="font-size:26px;font-weight:700;letter-spacing:-0.6px;margin-bottom:8px;">Set up Jimmy</div>
        <div style="font-size:14.5px;color:var(--text-2);line-height:1.6;max-width:420px;margin:0 auto;">
          Connect your apps and Jimmy will unify everything into a searchable, intelligent second brain.
          You can add more at any time.
        </div>
      </div>

      <!-- Integration cards -->
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:32px;" id="onb-cards">
        ${INTEGRATIONS.map((itg, i) => `
          <div id="onb-${itg.id}" style="display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;transition:border-color .15s;">
            <div style="font-size:22px;flex-shrink:0;">${itg.icon}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;margin-bottom:2px;">${itg.name}</div>
              <div style="font-size:12.5px;color:var(--text-2);line-height:1.45;">${itg.desc}</div>
            </div>
            <button onclick="onbConnect('${itg.id}')" id="onb-btn-${itg.id}"
              style="flex-shrink:0;padding:7px 14px;border:1px solid var(--border-mid);border-radius:9px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s;"
              onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='var(--surface)'">
              ${itg.action}
            </button>
          </div>`).join('')}
      </div>

      <!-- Footer actions -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border);">
        <button onclick="skipOnboarding()" style="background:none;border:none;color:var(--text-3);font-family:var(--font);font-size:13px;cursor:pointer;padding:0;">
          Skip for now →
        </button>
        <button class="btn btn-primary" onclick="finishOnboarding()" id="onb-finish-btn" style="opacity:0.5;" disabled>
          Start using Jimmy
        </button>
      </div>
      <div id="onb-status" style="text-align:center;font-size:12px;color:var(--text-3);margin-top:12px;"></div>
    </div>
  `;
}

async function onbConnect(id) {
  const itg = INTEGRATIONS.find(i=>i.id===id);
  if (!itg) return;
  const btn = $(`onb-btn-${id}`);
  if (btn) { btn.disabled=true; btn.textContent='Connecting…'; }
  try {
    await itg.setup();
    // Check if connection worked
    const connected = await itg.check();
    const card = $(`onb-${id}`);
    if (connected && card) {
      card.style.borderColor = 'var(--success)';
      if (btn) { btn.textContent='✓ Connected'; btn.style.color='var(--success)'; btn.style.borderColor='rgba(52,199,89,0.4)'; }
    } else {
      if (btn) { btn.disabled=false; btn.textContent=itg.action; }
    }
  } catch {
    if (btn) { btn.disabled=false; btn.textContent=itg.action; }
  }
  // Enable finish if at least one is connected
  const anyConnected = await Promise.all(INTEGRATIONS.map(i=>i.check())).then(r=>r.some(Boolean));
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=!anyConnected; finishBtn.style.opacity=anyConnected?'1':'0.5'; }
}

async function finishOnboarding() {
  const statusEl = $('onb-status');
  if (statusEl) statusEl.textContent = 'Syncing your sources…';
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=true; finishBtn.textContent='Syncing…'; }
  try { await fetch('/refresh', {method:'POST'}); } catch {}
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

function skipOnboarding() {
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

checkOnboarding();
</script>
