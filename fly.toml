# Fly.io config for Jimmy
# Deploy: fly deploy
# First time: fly launch --no-deploy, then fly deploy

app = "jimmy-rb"
primary_region = "ewr"  # Newark (closest to NYC)

[build]
  dockerfile = "Dockerfile"

[env]
  JIMMY_DATA_DIR = "/data"
  PORT = "7700"

[http_service]
  internal_port = 7700
  force_https = true
  auto_stop_machines = false   # keep warm — ChromaDB needs to stay loaded
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2

[[mounts]]
  source = "jimmy_data"
  destination = "/data"
  initial_size = "20gb"
