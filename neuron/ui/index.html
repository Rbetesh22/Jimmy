// ── PRACTICE ───────────────────────────────────────────────────────────────────
// Practice session state
let _practiceExercises = [];
let _practiceIdx = 0;
let _practiceResults = [];
let _practiceTopic = '';
let _practiceDifficulty = 'medium';

async function renderPractice() {
  setTopbar('Practice', 'Test yourself on your knowledge base');
  hideInput();
  $('content').innerHTML = `<div style="max-width:720px;margin:0 auto;padding:28px 24px 60px;" class="fade-up"><div id="practice-body">${loading('Loading…')}</div></div>`;
  try {
    const [due, plan] = await Promise.all([
      api('/srs/due').catch(()=>({due:[]})),
      api('/study-plan').catch(()=>null)
    ]);
    const allDue = due.due || [];
    const topicsDue = allDue.filter(c => c.type === 'topic');
    const todayTopics = (plan && plan.today_topics) || [];

    // Quick-start topic chips: SRS overdue first, then today's plan, then courses
    const courseChips = [
      {label:'Operating Systems', topic:'Operating Systems'},
      {label:'Computer Networks', topic:'Computer Networks'},
      {label:'Algorithms', topic:'Algorithms'},
      {label:'Financial Accounting', topic:'Financial Accounting'},
    ];
    const dueChips = topicsDue.slice(0,3).map(t => ({label:'⚠ '+t.topic, topic:t.topic}));
    const chips = [...dueChips, ...courseChips];

    let planHtml = '';
    if (plan && plan.today_focus) {
      planHtml = `<div style="background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:20px;font-size:13.5px;color:var(--text-2);">
        <span style="font-weight:600;color:var(--text);">Today:</span> ${esc(plan.today_focus)}
        ${plan.srs_due ? ` · <span style="color:var(--danger);font-weight:600;">${plan.srs_due} SRS due</span>` : ''}
        ${plan.streak_days ? ` · ${plan.streak_days}d streak 🔥` : ''}
      </div>`;
    }

    $('practice-body').innerHTML = `
      ${planHtml}
      <div style="margin-bottom:28px;">
        <div style="font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-serif);margin-bottom:6px;">What do you want to practice?</div>
        <div style="font-size:14px;color:var(--text-3);margin-bottom:18px;">I'll generate 6 exam-quality questions from your actual notes and course materials.</div>
        <input id="practice-topic-inp" type="text" placeholder="e.g. virtual memory, TCP congestion control, journal entries…"
          style="width:100%;padding:12px 14px;border:1.5px solid var(--border-mid);border-radius:var(--radius);font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none;box-sizing:border-box;margin-bottom:12px;"
          onkeydown="if(event.key==='Enter')startPracticeSession()">
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
          ${chips.map(c=>`<button onclick="document.getElementById('practice-topic-inp').value=${JSON.stringify(c.topic)};startPracticeSession()"
            style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--text-2);cursor:pointer;font-family:var(--font);">${esc(c.label)}</button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;">
          <span style="font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;">Difficulty:</span>
          ${['easy','medium','hard','adaptive'].map(d=>`<button id="diff-${d}" onclick="setPracticeDiff('${d}')"
            style="border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--font);background:${d==='medium'?'var(--accent)':'var(--surface)'};color:${d==='medium'?'#fff':'var(--text-2)'};">${d.charAt(0).toUpperCase()+d.slice(1)}</button>`).join('')}
        </div>
        <button onclick="startPracticeSession()" class="btn btn-primary" style="padding:10px 28px;font-size:15px;">Start Practice →</button>
      </div>

      ${topicsDue.length ? `<div style="margin-bottom:24px;">
        <div style="font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">SRS Due Today (${topicsDue.length})</div>
        ${topicsDue.map(t=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="font-size:14px;color:var(--text);">${esc(t.topic)}</div>
            <button onclick="document.getElementById('practice-topic-inp').value=${JSON.stringify(t.topic)};startPracticeSession()"
              style="border:1px solid var(--accent);color:var(--accent);background:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:var(--font);">Practice</button>
          </div>`).join('')}
      </div>` : ''}

      ${plan && plan.plan && plan.plan.length ? `<div>
        <div style="font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">This Week${plan.week?' — '+plan.week:''}</div>
        ${plan.plan.map(d=>`
          <div style="display:flex;gap:14px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="min-width:88px;">
              <div style="font-size:13px;font-weight:${d.is_today?'700':'500'};color:${d.is_today?'var(--accent)':'var(--text)'};">${esc(d.day)}</div>
              <div style="font-size:11px;color:var(--text-3);">${d.duration_min||0} min</div>
            </div>
            <div>
              <div style="font-size:13.5px;color:var(--text);">${esc(d.focus||'')}</div>
              ${d.topics&&d.topics.length?`<div style="font-size:11.5px;color:var(--text-3);margin-top:2px;">${d.topics.map(t=>esc(t)).join(' · ')}</div>`:''}
            </div>
          </div>`).join('')}
      </div>` : ''}
    `;
  } catch(e) {
    $('practice-body').innerHTML = `<div style="color:var(--danger);padding:12px 0;">${esc(e.message)}</div>`;
  }
}

function setPracticeDiff(d) {
  _practiceDifficulty = d;
  ['easy','medium','hard','adaptive'].forEach(x => {
    const btn = document.getElementById('diff-'+x);
    if (!btn) return;
    btn.style.background = x===d ? 'var(--accent)' : 'var(--surface)';
    btn.style.color = x===d ? '#fff' : 'var(--text-2)';
  });
}

async function startPracticeSession(topic) {
  const inp = document.getElementById('practice-topic-inp');
  _practiceTopic = (topic || (inp && inp.value.trim()) || '').trim();
  if (!_practiceTopic) { if (inp) inp.focus(); return; }
  _practiceExercises = [];
  _practiceIdx = 0;
  _practiceResults = [];

  const body = $('practice-body');
  body.innerHTML = loading(`Generating questions on "${_practiceTopic}"…`);

  try {
    const d = await api('/practice', {method:'POST', body:JSON.stringify({topic:_practiceTopic, difficulty:_practiceDifficulty})});
    _practiceExercises = d.exercises || [];
    if (!_practiceExercises.length) {
      body.innerHTML = `<div style="color:var(--text-3);padding:20px 0;">${esc(d.message||'No questions generated. Try a different topic.')}</div>
        <button onclick="renderPractice()" class="btn" style="margin-top:12px;">← Back</button>`;
      return;
    }
    _showPracticeQuestion();
  } catch(e) {
    body.innerHTML = `<div style="color:var(--danger);padding:12px 0;">${esc(e.message)}</div>
      <button onclick="renderPractice()" class="btn" style="margin-top:12px;">← Back</button>`;
  }
}

function _showPracticeQuestion() {
  const body = $('practice-body');
  const ex = _practiceExercises[_practiceIdx];
  const n = _practiceExercises.length;
  const isMCQ = ex.type === 'multiple_choice' || (ex.options && ex.options.length);
  const typeLabel = {multiple_choice:'Multiple Choice',concept:'Concept',application:'Application',synthesis:'Synthesis',coding:'Coding'}[ex.type] || ex.type;
  const diffColor = {easy:'#2a9d5c',medium:'#c1440e',hard:'#c00'}[ex.difficulty] || 'var(--text-3)';

  // For MCQ, strip the options from the question stem
  let stem = ex.question || '';
  if (isMCQ && ex.options) {
    stem = stem.split('\n')[0]; // just the stem line
  }

  body.innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="renderPractice()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:18px;padding:0;">←</button>
        <span style="font-size:13px;color:var(--text-3);">${_practiceTopic}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;font-weight:600;color:${diffColor};text-transform:uppercase;">${esc(ex.difficulty||'')}</span>
        <span style="font-size:12px;color:var(--text-3);">Q${_practiceIdx+1} / ${n}</span>
      </div>
    </div>

    <div style="background:var(--surface-2);border-radius:4px;height:4px;margin-bottom:24px;overflow:hidden;">
      <div style="background:var(--accent);height:100%;width:${(_practiceIdx/n*100).toFixed(0)}%;transition:width .3s;"></div>
    </div>

    <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">${esc(typeLabel)}</div>
    <div style="font-size:17px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:20px;font-family:var(--font-serif);">${esc(stem)}</div>

    ${isMCQ && ex.options ? `
      <div id="mcq-opts" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
        ${ex.options.map((opt,i) => `
          <button id="mcq-opt-${i}" onclick="_selectMCQ(${i})"
            style="text-align:left;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:14px;color:var(--text);cursor:pointer;font-family:var(--font);line-height:1.5;transition:border-color .15s;">
            ${esc(opt)}
          </button>`).join('')}
      </div>
      <button id="practice-submit" onclick="_submitPracticeAnswer()" disabled
        class="btn btn-primary" style="padding:10px 24px;opacity:.4;cursor:not-allowed;">Submit</button>
    ` : `
      <textarea id="practice-ans" rows="5" placeholder="Type your answer here…"
        style="width:100%;padding:12px 14px;border:1.5px solid var(--border-mid);border-radius:var(--radius);font-family:var(--font);font-size:14px;line-height:1.6;background:var(--surface);color:var(--text);outline:none;box-sizing:border-box;resize:vertical;margin-bottom:14px;"
        onkeydown="if(event.ctrlKey&&event.key==='Enter')_submitPracticeAnswer()"></textarea>
      <div style="display:flex;gap:10px;align-items:center;">
        <button onclick="_submitPracticeAnswer()" class="btn btn-primary" style="padding:10px 24px;">Submit Answer</button>
        <span style="font-size:11px;color:var(--text-3);">Ctrl+Enter to submit</span>
      </div>
    `}

    <div id="practice-feedback" style="margin-top:20px;"></div>
    ${ex.source_hint ? `<div style="margin-top:20px;font-size:11.5px;color:var(--text-3);font-style:italic;">${esc(ex.source_hint)}</div>` : ''}
  `;

  // For MCQ, track selected option
  window._selectedMCQIdx = null;
}

function _selectMCQ(i) {
  window._selectedMCQIdx = i;
  const ex = _practiceExercises[_practiceIdx];
  ex.options.forEach((_,j) => {
    const btn = document.getElementById('mcq-opt-'+j);
    if (!btn) return;
    btn.style.borderColor = j===i ? 'var(--accent)' : 'var(--border)';
    btn.style.background = j===i ? 'rgba(193,68,14,.07)' : 'var(--surface)';
  });
  const sub = document.getElementById('practice-submit');
  if (sub) { sub.disabled = false; sub.style.opacity = '1'; sub.style.cursor = 'pointer'; }
}

async function _submitPracticeAnswer() {
  const ex = _practiceExercises[_practiceIdx];
  const isMCQ = ex.type === 'multiple_choice' || (ex.options && ex.options.length);
  let userAnswer = '';

  if (isMCQ) {
    if (window._selectedMCQIdx === null) return;
    userAnswer = ex.options[window._selectedMCQIdx];
    // Disable all option buttons
    ex.options.forEach((_,j) => {
      const btn = document.getElementById('mcq-opt-'+j);
      if (btn) btn.style.pointerEvents = 'none';
    });
  } else {
    const ta = document.getElementById('practice-ans');
    userAnswer = ta ? ta.value.trim() : '';
    if (!userAnswer) return;
    if (ta) ta.disabled = true;
  }

  // Disable submit button
  const sub = document.getElementById('practice-submit');
  if (sub) { sub.disabled = true; sub.style.opacity = '.5'; }
  const fbEl = document.getElementById('practice-feedback');
  if (fbEl) fbEl.innerHTML = loading('Evaluating…');

  try {
    const result = await api('/practice/evaluate', {method:'POST', body:JSON.stringify({
      question: ex.question, user_answer: userAnswer,
      correct_answer: ex.answer, explanation: ex.explanation||'', topic: _practiceTopic
    })});

    _practiceResults.push({ex, userAnswer, result});

    const score = result.score || 'partial';
    const scoreColor = {correct:'#2a9d5c', partial:'#e5a200', incorrect:'#c00'}[score] || 'var(--text-2)';
    const scoreIcon = {correct:'✓', partial:'~', incorrect:'✗'}[score] || '~';
    const scoreLabel = {correct:'Correct', partial:'Partially correct', incorrect:'Incorrect'}[score] || score;

    // For MCQ: highlight the right and wrong options
    if (isMCQ && ex.options) {
      const correctLetter = (ex.answer||'').trim().charAt(0).toUpperCase();
      ex.options.forEach((opt, j) => {
        const btn = document.getElementById('mcq-opt-'+j);
        if (!btn) return;
        const optLetter = opt.trim().charAt(0).toUpperCase();
        if (optLetter === correctLetter) {
          btn.style.borderColor = '#2a9d5c';
          btn.style.background = 'rgba(42,157,92,.1)';
        } else if (j === window._selectedMCQIdx && score !== 'correct') {
          btn.style.borderColor = '#c00';
          btn.style.background = 'rgba(200,0,0,.07)';
        }
      });
    }

    const isLast = _practiceIdx >= _practiceExercises.length - 1;
    if (fbEl) fbEl.innerHTML = `
      <div style="border:1.5px solid ${scoreColor};border-radius:var(--radius);padding:16px 18px;">
        <div style="font-size:16px;font-weight:700;color:${scoreColor};margin-bottom:8px;">${scoreIcon} ${scoreLabel}</div>
        ${result.feedback ? `<div style="font-size:14px;color:var(--text);line-height:1.65;margin-bottom:${result.key_gap?'10px':'0'}">${esc(result.feedback)}</div>` : ''}
        ${result.key_gap ? `<div style="font-size:13px;color:var(--text-2);border-top:1px solid var(--border);padding-top:10px;margin-top:2px;line-height:1.6;"><strong>Key gap:</strong> ${esc(result.key_gap)}</div>` : ''}
        ${score !== 'correct' ? `<div style="font-size:13px;color:var(--text-3);border-top:1px solid var(--border);padding-top:10px;margin-top:8px;line-height:1.6;"><strong>Answer:</strong> ${esc(ex.answer||'')}</div>` : ''}
      </div>
      <div style="margin-top:16px;">
        <button onclick="${isLast ? '_showPracticeSummary()' : '_nextPracticeQuestion()'}" class="btn btn-primary" style="padding:10px 24px;">
          ${isLast ? 'See Results →' : 'Next Question →'}
        </button>
      </div>
    `;
  } catch(e) {
    if (fbEl) fbEl.innerHTML = `<div style="color:var(--danger);">${esc(e.message)}</div>`;
  }
}

function _nextPracticeQuestion() {
  _practiceIdx++;
  _showPracticeQuestion();
}

function _showPracticeSummary() {
  const body = $('practice-body');
  const total = _practiceResults.length;
  const correct = _practiceResults.filter(r => r.result.score === 'correct').length;
  const partial = _practiceResults.filter(r => r.result.score === 'partial').length;
  const pct = total ? Math.round((correct + partial*0.5) / total * 100) : 0;

  body.innerHTML = `
    <div style="text-align:center;padding:24px 0 32px;">
      <div style="font-size:52px;font-weight:800;color:var(--accent);font-family:var(--font-serif);">${pct}%</div>
      <div style="font-size:15px;color:var(--text-2);margin-top:6px;">${correct} correct · ${partial} partial · ${total-correct-partial} incorrect out of ${total}</div>
      <div style="font-size:13px;color:var(--text-3);margin-top:4px;">SRS updated — questions you missed will resurface.</div>
    </div>
    <div style="margin-bottom:24px;">
      ${_practiceResults.map((r,i) => {
        const score = r.result.score||'partial';
        const icon = {correct:'✓',partial:'~',incorrect:'✗'}[score];
        const col = {correct:'#2a9d5c',partial:'#e5a200',incorrect:'#c00'}[score];
        const stem = r.ex.question.split('\n')[0];
        return `<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:start;">
          <div style="font-size:15px;font-weight:700;color:${col};flex-shrink:0;width:20px;">${icon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13.5px;color:var(--text);line-height:1.5;">${esc(stem)}</div>
            ${r.result.key_gap ? `<div style="font-size:12px;color:var(--text-3);margin-top:3px;">${esc(r.result.key_gap)}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="startPracticeSession(${JSON.stringify(_practiceTopic)})" class="btn btn-primary" style="padding:10px 24px;">Practice Again</button>
      <button onclick="renderPractice()" class="btn" style="padding:10px 20px;">← Back</button>
    </div>
  `;
}

async function renderTimeline() {
  setTopbar('Timeline', 'Content added over the last 16 weeks');
  hideInput();
  $('content').innerHTML = `<div style="max-width:820px;margin:0 auto;padding:28px 24px 60px;" class="fade-up"><div id="timeline-body">${loading('Loading timeline…')}</div></div>`;
  try {
    const d = await api('/timeline?days=112');
    const items = d.heatmap || d.items || d.days || d.entries || [];
    if (!items.length) {
      $('timeline-body').innerHTML = '<div style="color:var(--text-3);padding:20px 0;">No timeline data available.</div>';
      return;
    }
    // Determine max count for heatmap scaling
    const counts = items.map(it => it.count||it.total||0);
    const maxCount = Math.max(...counts, 1);
    const getColor = (n) => {
      if (!n) return 'var(--surface-2)';
      const intensity = Math.ceil((n / maxCount) * 4);
      const colors = ['','rgba(193,68,14,0.2)','rgba(193,68,14,0.4)','rgba(193,68,14,0.65)','rgba(193,68,14,0.9)'];
      return colors[intensity] || colors[4];
    };
    let html = `<div style="margin-bottom:20px;">
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        ${items.map(it => {
          const n = it.count||it.total||0;
          const date = it.date||it.day||'';
          return `<div title="${esc(date)}: ${n} item${n===1?'':'s'}"
            style="width:14px;height:14px;border-radius:3px;background:${getColor(n)};cursor:default;"></div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
        <span style="font-size:11px;color:var(--text-3);">Less</span>
        ${['var(--surface-2)','rgba(193,68,14,0.2)','rgba(193,68,14,0.4)','rgba(193,68,14,0.65)','rgba(193,68,14,0.9)'].map(c=>`<div style="width:12px;height:12px;border-radius:2px;background:${c};"></div>`).join('')}
        <span style="font-size:11px;color:var(--text-3);">More</span>
      </div>
    </div>
    <div>
      <div style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;">Recent Activity</div>
      ${items.filter(it=>(it.count||it.total||0)>0).slice().reverse().slice(0,20).map(it=>{
        const n = it.count||it.total||0;
        const date = it.date||it.day||'';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:13.5px;color:var(--text);">${esc(date)}</span>
          <span style="font-size:13px;color:var(--text-2);font-weight:600;">${n} item${n===1?'':'s'}</span>
        </div>`;
      }).join('')}
    </div>`;
    $('timeline-body').innerHTML = html;
  } catch(e) {
    $('timeline-body').innerHTML = `<div style="color:var(--danger);padding:12px 0;">${esc(e.message)}</div>`;
  }
}

async function _submitGoodNotes() {
  const inp = $('gn-file');
  if (!inp || !inp.files || !inp.files[0]) { $('gn-status').innerHTML = '<span style="color:var(--danger);">Please select a file.</span>'; return; }
  $('gn-status').innerHTML = loading('Syncing…');
  try {
    const fd = new FormData();
    fd.append('file', inp.files[0]);
    const r = await fetch('/ingest/goodnotes', {method:'POST', body: fd});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || `Error ${r.status}`);
    $('gn-status').innerHTML = '<span style="color:var(--success);">GoodNotes content synced!</span>';
    inp.value = '';
  } catch(e) {
    $('gn-status').innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
  }
}

document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e.key==='Escape') closeDrawer();
  if(e.key==='/'&&!e.metaKey){e.preventDefault();setMode('ask');}
  if(!e.metaKey&&!e.ctrlKey){
    if(e.key==='d') setMode('digest');
    if(e.key==='r') setMode('recent');
    if(e.key==='u') setMode('upcoming');
    if(e.key==='n') setMode('note');
    if(e.key==='s') setMode('spark');
    if(e.key==='p') setMode('practice');
    if(e.key==='t') setMode('timeline');
    if(e.key==='f'){e.preventDefault();setMode('search');}
  }
});

const ONBOARDING_KEY = 'neuron_onboarded_v1';

async function checkOnboarding() {
  if (localStorage.getItem(ONBOARDING_KEY)) { setMode('digest'); return; }
  try {
    const d = await fetch('/health').then(r=>r.json());
    if ((d.kb_size || d.total_chunks || 0) > 0) {
      localStorage.setItem(ONBOARDING_KEY, '1');
      setMode('digest');
    } else {
      renderOnboarding();
    }
  } catch {
    setMode('digest');
  }
}

async function onbConnect(id) {
  const itg = INTEGRATIONS.find(i=>i.id===id);
  if (!itg) return;
  const btn = $(`onb-btn-${id}`);
  if (btn) { btn.disabled=true; btn.textContent='Connecting…'; }
  try {
    await itg.setup();
    // Check if connection worked
    const connected = await itg.check();
    const card = $(`onb-${id}`);
    if (connected && card) {
      card.style.borderColor = 'var(--success)';
      if (btn) { btn.textContent='✓ Connected'; btn.style.color='var(--success)'; btn.style.borderColor='rgba(52,199,89,0.4)'; }
    } else {
      if (btn) { btn.disabled=false; btn.textContent=itg.action; }
    }
  } catch {
    if (btn) { btn.disabled=false; btn.textContent=itg.action; }
  }
  // Enable finish if at least one is connected
  const anyConnected = await Promise.all(INTEGRATIONS.map(i=>i.check())).then(r=>r.some(Boolean));
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=!anyConnected; finishBtn.style.opacity=anyConnected?'1':'0.5'; }
}

async function finishOnboarding() {
  const statusEl = $('onb-status');
  if (statusEl) statusEl.textContent = 'Syncing your sources…';
  const finishBtn = $('onb-finish-btn');
  if (finishBtn) { finishBtn.disabled=true; finishBtn.textContent='Syncing…'; }
  try { await fetch('/refresh', {method:'POST'}); } catch {}
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

function skipOnboarding() {
  localStorage.setItem(ONBOARDING_KEY, '1');
  setMode('digest');
}

checkOnboarding();
</script>
</body>
</html>
