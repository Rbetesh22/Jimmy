<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Neuron</title>

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Neuron">
  <meta name="theme-color" content="#fafaf8">
  <link rel="manifest" href="/manifest.json">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>if(typeof marked==='undefined'){window.marked={parse:s=>s.replace(/\n/g,'<br>')}}</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* warm paper palette */
      --bg:          #faf8f5;
      --sidebar-bg:  #ffffff;
      --surface:     #ffffff;
      --surface-2:   #f5f0eb;
      --border:      #e8e0d5;
      --border-mid:  #d4c8bc;
      /* terracotta accent */
      --accent:      #c1440e;
      --accent-light:#fdf0eb;
      /* text hierarchy */
      --text:        #2c2420;
      --text-2:      #6b5f58;
      --text-3:      #9e908a;
      --link:        #c1440e;
      --success:     #2d8a4e;
      --danger:      #c0392b;
      --warning:     #d97706;
      --font:        -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      --font-serif:  'Georgia', 'Times New Roman', serif;
      --mono:        "SF Mono", ui-monospace, Menlo, monospace;
      --sidebar-w:   210px;
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);
      --radius:      12px;
      --shadow-sm:   0 1px 3px rgba(44,36,32,0.08);
      --shadow-md:   0 4px 16px rgba(44,36,32,0.1);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }

    body {
      font-family: var(--font);
      color: var(--text);
      display: flex;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, #c1440e 0%, #e8613a 100%);
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 4px;
    }

    .nav-section { margin-bottom: 1px; }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 10px 10px 2px;
      opacity: 0.7;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 9px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      text-decoration: none;
      line-height: 1;
    }

    .nav-item:hover  { background: var(--surface-2); color: var(--text); }
    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
      border-left: 3px solid var(--accent);
      padding-left: 6px;
    }
    .nav-item svg    { flex-shrink: 0; opacity: 0.5; }
    .nav-item:hover svg { opacity: 0.75; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 8px 8px 10px;
    }

    #sync-btn {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border-mid);
      border-radius: 7px;
      background: transparent;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all 0.12s;
    }

    #sync-btn:hover  { background: var(--surface-2); color: var(--text); }
    #sync-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── MAIN ─────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #topbar-title { font-size: 13px; font-weight: 600; letter-spacing: .01em; color: var(--text); }
    #topbar-meta  { font-size: 11.5px; color: var(--text-3); }

    #content    { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
    #input-area { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg); padding: 14px 20px; }
    #input-area.hidden { display: none; }

    /* ── SCROLLBAR ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    /* ── PROSE ────────────────────────────────────────────────────── */
    .prose {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      font-family: var(--font-serif);
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .prose h1 { font-size: 1.3em; font-weight: 700; margin: 1.1em 0 0.4em; letter-spacing: -0.4px; }
    .prose h2 { font-size: 1.05em; font-weight: 700; margin: 1.4em 0 0.4em; color: var(--text); letter-spacing: -0.2px; }
    .prose h3 { font-size: 0.95em; font-weight: 600; margin: 0.9em 0 0.3em; color: var(--text-2); }
    .prose p  { margin: 0.45em 0; }
    .prose ul, .prose ol { padding-left: 1.4em; margin: 0.35em 0; }
    .prose li { margin: 0.15em 0; }
    .prose strong { font-weight: 600; }
    .prose code {
      font-family: var(--mono);
      font-size: 0.84em;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    .prose blockquote {
      border-left: 2px solid var(--border-mid);
      padding: 0.2em 0.8em;
      margin: 0.5em 0;
      color: var(--text-2);
    }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 0.9em 0; }
    .prose a  { color: var(--link); }

    .cite {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; line-height: 1;
      color: var(--text-2); background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 4px; margin: 0 1px;
      cursor: pointer; vertical-align: super;
      transition: background 0.1s;
      font-style: normal; font-family: var(--font);
    }
    .cite:hover { background: var(--border-mid); color: var(--text); }

    .cite-highlight {
      background: var(--surface-2) !important;
      color: var(--text) !important;
    }

    /* ── PILL BAR ─────────────────────────────────────────────────── */
    .pill-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

    .pill {
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border-mid);
      background: var(--surface);
      color: var(--text-2);
      font-family: var(--font);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s var(--ease);
    }
    .pill:hover  { border-color: var(--text); color: var(--text); }
    .pill.active { background: var(--text); border-color: var(--text); color: #fff; }

    /* ── INPUT / BUTTON ───────────────────────────────────────────── */
    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea, input[type="url"], input[type="text"] {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border-mid);
      border-radius: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-font-smoothing: antialiased;
      resize: none;
    }
    textarea:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(193,68,14,0.12);
    }
    textarea { width: 100%; }
    textarea::placeholder, input::placeholder { color: var(--text-3); }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s var(--ease);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-primary { background: var(--accent); color: #fff; border-radius: 8px; }
    .btn-primary:hover   { filter: brightness(1.08); }
    .btn-primary:active  { filter: brightness(0.95); }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }

    /* ── SPINNER ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 1.5px solid var(--border-mid);
      border-top-color: var(--text-2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    .loading-row {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-2); font-size: 13.5px; padding: 28px 24px;
    }

    /* ── STREAMING CURSOR ─────────────────────────────────────────── */
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    .streaming::after {
      content: '';
      display: inline-block;
      width: 2px; height: 0.9em;
      background: var(--text-3);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-start infinite;
      border-radius: 1px;
    }

    /* ── WELCOME ──────────────────────────────────────────────────── */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 40px; text-align: center;
    }
    .welcome-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #c1440e 0%, #e8613a 100%);
      border-radius: 10px;
      margin-bottom: 18px;
    }
    .welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .welcome p  { font-size: 13.5px; color: var(--text-2); max-width: 340px; line-height: 1.6; margin-bottom: 24px; }

    .suggestion-grid { display: flex; flex-direction: column; gap: 2px; }
    .suggestion {
      padding: 6px 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--text-2);
      text-align: left;
      line-height: 1.5;
      transition: color 0.1s;
    }
    .suggestion:hover { color: var(--text); }

    /* hover-dim: for news/media card links */
    a.hover-dim { transition: opacity 0.12s; }
    a.hover-dim:hover { opacity: 0.75; }

    /* ── ANSWER ───────────────────────────────────────────────────── */
    .answer-wrap { max-width: 700px; margin: 0 auto; padding: 32px 28px; }

    .question-header {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .answer-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    /* ── SOURCES ──────────────────────────────────────────────────── */
    .sources-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .sources-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
    }
    .sources-grid { display: flex; flex-wrap: wrap; gap: 7px; }

    .source-chip {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 11px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.14s var(--ease);
      max-width: 210px;
      text-align: left;
    }
    .source-chip:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .chip-icon  { font-size: 14px; flex-shrink: 0; }
    .chip-title { font-size: 11.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 145px; }
    .chip-sub   { font-size: 10px; color: var(--text-3); }

    /* ── STAT CARDS ───────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s var(--ease);
    }
    .stat-card:hover { box-shadow: var(--shadow-md); }
    .stat-value { font-size: 27px; font-weight: 700; letter-spacing: -0.8px; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--text-2); }

    /* ── SOURCE BAR ───────────────────────────────────────────────── */
    .source-bar { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .bar-icon   { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
    .bar-name   { font-size: 12.5px; color: var(--text); width: 110px; flex-shrink: 0; }
    .bar-track  { flex: 1; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
    .bar-fill   { height: 100%; background: var(--accent); border-radius: 2px; }
    .bar-count  { font-size: 11px; color: var(--text-3); width: 48px; text-align: right; flex-shrink: 0; }

    /* ── CARD ─────────────────────────────────────────────────────── */
    .card {
      padding: 18px 20px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      transition: box-shadow 0.2s var(--ease);
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .card:hover { box-shadow: var(--shadow-md); }

    /* ── CALENDAR ─────────────────────────────────────────────────── */
    .cal-day { margin-bottom: 22px; }
    .cal-day-header {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-2);
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .today-badge {
      background: var(--accent); color: #fff;
      font-size: 10px; padding: 2px 8px; border-radius: 100px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .cal-event {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      transition: background 0.12s;
    }
    .cal-event:hover { background: var(--surface-2); }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
    .cal-title { font-size: 13.5px; color: var(--text); }
    .cal-sub   { font-size: 11.5px; color: var(--text-2); margin-top: 1px; }

    /* ── RECENT ───────────────────────────────────────────────────── */
    .recent-group { margin-bottom: 24px; }
    .recent-group-header {
      font-size: 11.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-2);
      padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .recent-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; transition: background 0.12s; }
    .recent-item:hover { background: var(--surface-2); }
    .recent-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .recent-sub   { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .recent-date  { font-size: 11px; color: var(--text-3); flex-shrink: 0; }

    /* ── INGEST ───────────────────────────────────────────────────── */
    .ingest-wrap { max-width: 560px; margin: 0 auto; padding: 32px 24px; }
    .ingest-wrap h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .ingest-wrap p  { font-size: 13.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 20px; }

    .drop-zone {
      border: 2px dashed var(--border-mid);
      border-radius: 18px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s var(--ease);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .drop-zone-icon { margin-bottom: 12px; display:flex; justify-content:center; }
    .drop-zone h3   { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
    .drop-zone p    { font-size: 13px; color: var(--text-2); margin: 0; }

    /* ── ALERT ────────────────────────────────────────────────────── */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid;
      line-height: 1.5;
      margin-top: 14px;
    }
    .alert-success { background: rgba(52,199,89,0.1); border-color: rgba(52,199,89,0.3); color: #1a7b3a; }
    .alert-error   { background: rgba(255,59,48,0.1); border-color: rgba(255,59,48,0.3); color: #c0392b; }
    @media (prefers-color-scheme: dark) {
      .alert-success { color: #4cd964; }
      .alert-error   { color: #ff6b6b; }
    }

    /* ── SEARCH ───────────────────────────────────────────────────── */
    .search-wrap { max-width: 680px; margin: 0 auto; padding: 32px 28px 60px; }

    .search-empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 24px; text-align: center; color: var(--text-3);
    }
    .search-empty-icon { width: 52px; height: 52px; margin-bottom: 18px; opacity: 0.35; }
    .search-empty-state p { font-size: 14px; line-height: 1.6; max-width: 280px; }

    .search-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .search-filter-btn {
      padding: 4px 12px; border-radius: 100px;
      border: 1px solid var(--border-mid); background: var(--surface);
      color: var(--text-2); font-family: var(--font); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.13s var(--ease);
    }
    .search-filter-btn:hover { border-color: var(--text); color: var(--text); }
    .search-filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

    .search-result-card {
      padding: 16px 18px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.18s var(--ease), border-color 0.18s;
    }
    .search-result-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-mid); }

    .search-result-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .search-result-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; flex: 1; }

    .search-score-badge {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 100px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
    }

    .search-result-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
    .source-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .source-dot-file        { background: #3b82f6; }
    .source-dot-canvas      { background: #f97316; }
    .source-dot-kindle      { background: #22c55e; }
    .source-dot-readwise    { background: #22c55e; }
    .source-dot-apple_notes { background: #eab308; }
    .source-dot-note        { background: #eab308; }
    .source-dot-web         { background: #a855f7; }
    .source-dot-calendar    { background: #14b8a6; }
    .source-dot-gmail       { background: #ef4444; }
    .source-dot-youtube     { background: #ef4444; }
    .source-dot-github      { background: #6b7280; }
    .source-dot-default     { background: var(--border-mid); }

    .search-result-source { font-size: 11.5px; color: var(--text-3); }
    .search-result-snippet { font-size: 13px; color: var(--text-2); line-height: 1.65; }
    .search-result-snippet mark {
      background: rgba(193,68,14,0.14); color: inherit; border-radius: 2px; padding: 0 1px;
    }
    .search-count { font-size: 12px; color: var(--text-3); margin-bottom: 16px; }

    /* ── FADE ─────────────────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse { 0%,100% { opacity:1; transform:translateY(-50%) scale(1); } 50% { opacity:0.4; transform:translateY(-50%) scale(0.7); } }
    .fade-up { animation: fadeIn 0.18s ease both; }

    /* ── SHIMMER SKELETON ─────────────────────────────────────────── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
    }
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }
    .skeleton-line { height: 13px; border-radius: 4px; margin-bottom: 9px; }
    .skeleton-line:last-child { margin-bottom: 0; }
    .sk-w-90 { width: 90%; } .sk-w-75 { width: 75%; } .sk-w-60 { width: 60%; }

    /* ── DRAWER ───────────────────────────────────────────────────── */
    #drawer { position: fixed; inset: 0; z-index: 200; display: none; }
    #drawer.open { display: block; }
    .drawer-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .drawer-panel {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,0.14);
    }
    .drawer-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .drawer-head-text { flex: 1; min-width: 0; }
    .drawer-title  { font-size: 14px; font-weight: 600; }
    .drawer-source { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }
    .drawer-close {
      width: 26px; height: 26px; border-radius: 50%;
      border: none; background: var(--surface-2); color: var(--text-2);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.12s;
    }
    .drawer-close:hover { background: var(--border-mid); color: var(--text); }
    .drawer-link {
      display: none;
      margin: 12px 18px 0;
      padding: 9px 12px;
      background: var(--surface-2);
      border-radius: 8px;
      font-size: 12px; color: var(--link);
      word-break: break-all;
      text-decoration: none;
    }
    .drawer-link:hover { text-decoration: underline; }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 16px 18px;
      font-size: 13.5px; line-height: 1.75;
      color: var(--text-2); white-space: pre-wrap; word-break: break-word;
    }

    /* ── iOS / MOBILE ─────────────────────────────────────────────── */
    /* Safe area insets for notch / home indicator */
    #sidebar    { padding-bottom: env(safe-area-inset-bottom); }
    #topbar     { padding-left: max(24px, env(safe-area-inset-left)); }
    #input-area { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }

    /* On narrow screens: collapse sidebar into a bottom tab bar */
    @media (max-width: 680px) {
      html, body { overflow: hidden; }
      body { flex-direction: column; }

      #sidebar {
        width: 100%; height: auto;
        border-right: none;
        border-top: 1px solid var(--border);
        order: 2;
        flex-direction: row;
        align-items: stretch;
        padding-bottom: env(safe-area-inset-bottom);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #sidebar::-webkit-scrollbar { display: none; }
      .sidebar-logo, .nav-divider, .nav-label, .sidebar-footer { display: none; }
      .sidebar-body { display: flex; flex-direction: row; flex: 1; overflow: visible; padding: 0; }
      .nav-section { display: flex; flex-direction: row; margin: 0; }
      .nav-item {
        flex-direction: column; gap: 3px; padding: 8px 10px; min-width: 60px;
        border-radius: 0; font-size: 9.5px; font-weight: 500;
        align-items: center; justify-content: center; text-align: center;
        height: 52px; line-height: 1; flex-shrink: 0;
      }
      .nav-item svg { margin: 0; opacity: 0.6; }
      .nav-item.active { background: transparent; color: var(--text); font-weight: 700; border-left: none; padding-left: 10px; }
      .nav-item.active svg { opacity: 1; }
      /* Only show top-level nav items in mobile tab bar */
      #nav-status, #nav-note, #nav-url, #nav-file,
      #nav-goodnotes, #nav-youtube, #nav-timeline, #nav-search { display: none; }

      #main { order: 1; flex: 1; overflow: hidden; }
      #topbar { height: 48px; padding: 0 16px; padding-top: env(safe-area-inset-top); }
      #content { -webkit-overflow-scrolling: touch; }
      .answer-wrap { padding: 20px 16px; }
    }
  </style>
</head>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const ICONS = {
  canvas:'🎓',calendar:'📅',gmail:'✉️',gdrive:'📂',web:'🌐',
  youtube:'📺',note:'📝',file:'📄',granola:'🎙️',kindle:'📚',
  readwise:'📖',notion:'🗒️',github:'💻',podcast:'🎧',
  apple_notes:'📓',spotify:'🎵',twitter:'🐦',bookmarks:'🔖',
  instagram:'📸',tiktok:'📱',goodreads:'📗',letterboxd:'🎬',
  photos:'📷',voice_memo:'🎙️',trakt:'🎬',pocket:'📌',
  folder:'📁',youtube_liked:'👍',goodnotes:'📒',
};

let mode = null, queryType = 'ask', abortCtrl = null, sources = [];

// ── Utilities ─────────────────────────────────────────────────────────────
function setTopbar(title, meta='') { $('topbar-title').textContent=title; $('topbar-meta').textContent=meta; }
function showInput(html) { const el=$('input-area'); el.innerHTML=html; el.className=''; }
function hideInput() { $('input-area').className='hidden'; }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,180)+'px'; }

function setActive(m) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const el = $('nav-'+m); if(el) el.classList.add('active');
}

function loading(msg='Loading…') {
  return `<div class="loading-row"><span class="spinner"></span>${esc(msg)}</div>`;
}

function renderCitations(html) {
  // Turn [1], [2][3] etc. into clickable superscripts that highlight the source chip
  return html.replace(/\[(\d+)\]/g, (_, n) => {
    return `<sup class="cite" onclick="highlightSource(${n})">[${n}]</sup>`;
  });
}

function highlightSource(n) {
  const chips = document.querySelectorAll('.source-chip');
  chips.forEach(c => c.classList.remove('cite-highlight'));
  const chip = chips[n - 1];
  if (chip) {
    chip.classList.add('cite-highlight');
    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => chip.classList.remove('cite-highlight'), 2000);
  }
}

function alertHtml(msg, type='success') {
  return `<div class="alert alert-${type}">${esc(msg)}</div>`;
}

async function api(path, opts={}) {
  const r = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts });
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || `Error ${r.status}`);
  return d;
}

// ── Mode router ────────────────────────────────────────────────────────────
function setMode(m) {
  if (abortCtrl) { abortCtrl.abort(); abortCtrl=null; }
  mode = m;
  setActive(m);
  ({ask:renderAsk,digest:renderDigest,recent:renderRecent,upcoming:renderUpcoming,
    note:renderNote,url:renderURL,file:renderFile,youtube:renderYT,status:renderStatus,
    spark:renderSpark,practice:renderPractice,timeline:renderTimeline,news:renderNews,
    goodnotes:renderGoodNotes,search:renderSearch,library:renderLibraryPanel})[m]?.();
}

// ── ASK ────────────────────────────────────────────────────────────────────
const FALLBACK_SUGGESTIONS = [
  'What am I working on this week?',
  'Summarize my recent meetings',
  "What's due soon from my courses?",
  'What have I been reading lately?',
];

function renderAsk() {
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const dayStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  setTopbar('Neuron', dayStr);
  hideInput();

  const pills = ['ask','context','resurface','connections'];
  const pillLabels = {ask:'Ask',context:'Deep Dive',resurface:'Resurface',connections:'Thread Map'};
  const pillDescs = {
    ask: 'Ask anything…',
    context: 'Everything your KB says on a topic…',
    resurface: 'What did you save about this?',
    connections: 'How does this thread through your KB?',
  };

  $('content').innerHTML = `
    <div style="max-width:660px;margin:0 auto;padding:36px 28px 80px;" class="fade-up">

      <!-- Greeting + ask -->
      <div style="margin-bottom:32px;">
        <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:16px;">${greeting}</div>
        <div class="input-row" style="gap:8px;margin-bottom:8px;">
          <textarea id="ask-inp" rows="1" placeholder="Ask anything…"
            onkeydown="askKey(event)" oninput="autoResize(this)" style="font-size:14px;padding:11px 15px;"></textarea>
          <button class="btn btn-primary" id="ask-btn" onclick="runAsk()">Ask</button>
        </div>
        <div class="pill-bar" style="margin-bottom:0;">
          ${pills.map(t => `<button class="pill${t===queryType?' active':''}" id="pill-${t}" onclick="setQType('${t}')" title="${pillDescs[t]||''}">${pillLabels[t]}</button>`).join('')}
        </div>
      </div>

      <!-- Suggestions (minimal) -->
      <div style="margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div id="suggestion-grid" style="display:flex;flex-direction:column;gap:4px;">
          ${FALLBACK_SUGGESTIONS.map(q=>`<button class="suggestion" onclick="quickAsk(${JSON.stringify(q)})">${esc(q)}</button>`).join('')}
        </div>
      </div>

      <!-- What's on -->
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
          <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);">On Your Plate</div>
          <button onclick="setMode('digest')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">Full digest →</button>
        </div>
        <div id="home-digest" style="color:var(--text-2);font-size:13.5px;line-height:1.8;font-family:var(--font-serif);">
          <div class="skeleton" style="height:13px;border-radius:4px;margin-bottom:8px;width:90%;"></div>
          <div class="skeleton" style="height:13px;border-radius:4px;margin-bottom:8px;width:75%;"></div>
          <div class="skeleton" style="height:13px;border-radius:4px;width:60%;"></div>
        </div>
      </div>

      <!-- Study Plan (loaded from /study-plan) -->
      <div id="home-study-plan" style="display:none;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);"></div>

            <!-- News -->
      <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">

function setQType(t) {
  queryType = t;
  ['ask','context','resurface','connections'].forEach(k => {
    const el=$('pill-'+k); if(el) el.classList.toggle('active', k===t);
  });
  const inp = $('ask-inp');
  const descs = {ask:'Ask anything…',context:'Everything your KB says on a topic…',resurface:'What did you save about this?',connections:'How does this thread through your KB?'};
  if (inp) inp.placeholder = descs[t] || 'Ask anything…';
}

function quickAsk(q) { const el=$('ask-inp'); if(el){el.value=q;autoResize(el);} runAsk(); }
function askKey(e)   { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();runAsk();} }

async function runAsk() {
  const inp=$('ask-inp'); if(!inp) return;
  const q = inp.value.trim(); if(!q) return;
  if(abortCtrl){abortCtrl.abort();} abortCtrl=new AbortController();

  const btn=$('ask-btn'); if(btn){btn.disabled=true;btn.textContent='…';}

  // Switch to answer view — show bottom bar for follow-ups
  const pills2 = ['ask','context','resurface','connections'];
  const pillLabels2 = {ask:'Ask',context:'Deep Dive',resurface:'Resurface',connections:'Thread Map'};
  const pillDescs2 = {ask:'Ask anything…',context:'Everything your KB says on a topic…',resurface:'What did you save about this?',connections:'How does this thread through your KB?'};
  showInput(`
    <div style="margin-bottom:8px;display:flex;gap:5px;align-items:center;">
      <button onclick="setMode('ask')" style="padding:4px 10px;border:1px solid var(--border-mid);border-radius:7px;background:none;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer;flex-shrink:0;">← Home</button>
      <div style="flex:1;display:flex;gap:4px;flex-wrap:wrap;">
        ${pills2.map(t => `<button class="pill${t===queryType?' active':''}" id="pill-${t}" onclick="setQType('${t}')" title="${pillDescs2[t]||''}">${pillLabels2[t]}</button>`).join('')}
      </div>
    </div>
    <div class="input-row">
      <textarea id="ask-inp" rows="1" placeholder="${pillDescs2[queryType]||'Ask a follow-up…'}"
        onkeydown="askKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn btn-primary" id="ask-btn" onclick="runAsk()">Ask</button>
    </div>
  `);

  $('content').innerHTML = `
    <div class="answer-wrap fade-up">
      <div class="question-header">${esc(q)}</div>
      <div class="answer-divider"></div>
      <div id="ans" class="prose streaming"></div>
      <div id="src"></div>
    </div>
  `;

  const ans=$('ans'), src=$('src');
  sources = [];

  try {
    if (queryType === 'ask') {
      let text = '';
      const resp = await fetch('/ask/stream', {
        method:'POST', signal:abortCtrl.signal,
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({q, n_results:25}),
      });
      if(!resp.ok) throw new Error(`Server error ${resp.status}`);
      const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
      while(true) {
        const {done,value}=await reader.read(); if(done) break;
        buf += dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const line of lines) {
          if(!line.startsWith('data: ')) continue;
          try {
            const ev=JSON.parse(line.slice(6));
            if(ev.type==='sources') { sources=ev.sources||[]; renderSources(src,sources); }
            else if(ev.type==='token') { text+=ev.text; ans.innerHTML=renderCitations(marked.parse(text)); }
            else if(ev.type==='done') {
              text=ev.answer||text; ans.innerHTML=renderCitations(marked.parse(text)); ans.classList.remove('streaming');
              if(ev.sources?.length){sources=ev.sources;renderSources(src,sources);}
            } else if(ev.type==='error') throw new Error(ev.detail);
          } catch(_){}
        }
      }
      ans.classList.remove('streaming');
    } else {
      ans.innerHTML = loading('Thinking…');
      const ep = {context:'/context',resurface:'/resurface',connections:'/connections'}[queryType];
      const d = await api(ep, {method:'POST',signal:abortCtrl.signal,body:JSON.stringify({q,n_results:25})});
      sources = d.sources||[];
      ans.innerHTML = renderCitations(marked.parse(d.context_pack||d.result||d.answer||'No result.'));
      renderSources(src, sources);
    }
  } catch(err) {
    if(err.name==='AbortError') return;
    ans.classList.remove('streaming');
    ans.innerHTML = `<div class="alert alert-error">Error: ${esc(err.message)}</div>`;
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Ask';} abortCtrl=null;
  }
}

// ── DIGEST ─────────────────────────────────────────────────────────────────
function _parseDigestSections(md) {
  // Split digest markdown into named sections
  const sections = {};
  const lines = md.split('\n');
  let cur = 'intro', buf = [];
  for (const line of lines) {
    const h = line.match(/^#{1,3}\s+(.+)/);
    if (h) {
      if (buf.length) sections[cur] = buf.join('\n').trim();
      cur = h[1].trim();
      buf = [];
    } else {
      buf.push(line);
    }
  }
  if (buf.length) sections[cur] = buf.join('\n').trim();
  return sections;
}

async function renderDigest(forceRefresh=false) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const editionStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  setTopbar('Digest', dateStr); hideInput();

  $('content').innerHTML = `
    <div style="max-width:720px;margin:0 auto;padding:32px 28px 60px;">
      <div style="text-align:center;padding-bottom:18px;border-bottom:2px solid var(--border-mid);margin-bottom:24px;">
        <div style="font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;">Personal Briefing</div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-0.8px;line-height:1;">${dateStr}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:5px;">Updated ${editionStr} · Neuron</div>
      </div>
      <div id="digest-body" style="text-align:center;padding:18px 0;">${loading('Building your briefing…')}</div>
    </div>`;

  // Try SSE streaming first, fall back to plain fetch
  const _streamUrl = forceRefresh ? '/digest/stream?refresh=true' : '/digest/stream';
  let _streamDone = false;
  let _accumulated = '';
  const _digestBodyEl = $('digest-body');
  try {
    const _evtSrc = new EventSource(_streamUrl);
    await new Promise((resolve, reject) => {
      _evtSrc.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'token') {
            _accumulated += (ev.text ?? ev.token ?? '');
            if (_digestBodyEl) _digestBodyEl.innerHTML = `<div class="prose streaming" style="font-size:15px;line-height:1.85;font-family:var(--font-serif);max-width:680px;">${marked.parse(_accumulated)}</div>`;
          } else if (ev.type === 'done') {
            _streamDone = true;
            _evtSrc.close();
            resolve(ev);
          } else if (ev.type === 'error') {
            _evtSrc.close();
            reject(new Error(ev.detail || 'Stream error'));
          }
        } catch(_) {}
      };
      _evtSrc.onerror = () => { _evtSrc.close(); if (!_streamDone) reject(new Error('SSE failed')); };
    }).catch(() => null); // SSE errors fall through to plain fetch below
  } catch(_) { /* SSE not supported or failed */ }

  try {
    const url = forceRefresh ? '/digest?refresh=true' : '/digest';
    const d = await api(url);
    sources = d.sources || [];
    const raw = d.result || _accumulated || '';
    const secs = _parseDigestSections(raw);
    const cachedAt = d.cached_at ? new Date(d.cached_at) : null;
    const cacheLabel = cachedAt ? cachedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : editionStr;

    // Render each section as a newspaper column block
    function secBlock(title, icon='') {
      const body = secs[title] || '';
      if (!body) return '';
      return `
        <div style="margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);">
          <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">${icon} ${title}</div>
          <div class="prose" style="font-size:15px;line-height:1.85;font-family:var(--font-serif);max-width:680px;">${marked.parse(body)}</div>
        </div>`;
    }

    const sectionOrder = ['What Needs Attention','On Your Plate','Your World','Worth Exploring','One Thread Worth Pulling'];
    const icons = {'What Needs Attention':'⚠', 'On Your Plate':'📋', 'Your World':'🌍', 'Worth Exploring':'📖', 'One Thread Worth Pulling':'💡'};
    let bodyHtml = sectionOrder.map(s => secBlock(s, icons[s])).join('');

    // Fallback: if no sections parsed, just render the whole thing
    if (!bodyHtml.trim()) {
      bodyHtml = `<div class="prose" style="font-size:15px;line-height:1.85;font-family:var(--font-serif);max-width:680px;">${marked.parse(raw)}</div>`;
    }

    $('content').innerHTML = `
      <div style="max-width:720px;margin:0 auto;padding:32px 28px 60px;">
        <!-- Masthead -->
        <div style="text-align:center;padding-bottom:18px;border-bottom:2px solid var(--border-mid);margin-bottom:32px;">
          <div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;">Personal Briefing</div>
          <div style="font-size:28px;font-weight:800;letter-spacing:-0.8px;line-height:1;">${dateStr}</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px;">
            <div style="font-size:11px;color:var(--text-3);">Updated ${cacheLabel}</div>
            <button onclick="renderDigest(true)" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font);">↻ Refresh</button>
          </div>
        </div>

        <!-- Sections -->
        ${bodyHtml}

        <!-- Daily extras (fact + vocab) -->
        <div id="daily-extras" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;"></div>

        <!-- Sources -->
        <div id="src"></div>
      </div>`;

    renderSources($('src'), sources);

    // Load daily fact + vocab (24hr cache, fast)
    fetch('/daily').then(r=>r.json()).then(d=>{
      const el = $('daily-extras');
      if (!el) return;
      let html = '';

      if (d.fact) {
        html += `
          <div style="background:var(--surface-2);border-radius:12px;padding:16px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">✦ Today's Fact</div>
            <div style="font-size:13.5px;line-height:1.7;color:var(--text-2);">${esc(d.fact)}</div>
          </div>`;
      }

      if (d.vocab) {
        const v = d.vocab;
        html += `
          <div style="background:var(--surface-2);border-radius:12px;padding:16px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;">A Word to Know</div>
            <div style="margin-bottom:6px;">
              <span style="font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;">${esc(v.word||'')}</span>
              ${v.pronunciation ? `<span style="font-size:12px;color:var(--text-3);margin-left:6px;">${esc(v.pronunciation)}</span>` : ''}
              ${v.part_of_speech ? `<span style="font-size:11px;font-style:italic;color:var(--text-3);margin-left:4px;">${esc(v.part_of_speech)}</span>` : ''}
            </div>
            <div style="font-size:13.5px;color:var(--text);line-height:1.6;margin-bottom:6px;">${esc(v.definition||'')}</div>
            ${v.etymology ? `<div style="font-size:11.5px;color:var(--text-3);line-height:1.5;margin-bottom:6px;font-style:italic;">${esc(v.etymology)}</div>` : ''}
            ${v.example ? `<div style="font-size:12px;color:var(--text-2);line-height:1.6;border-left:2px solid var(--border-mid);padding-left:10px;">${esc(v.example)}</div>` : ''}
          </div>`;
      }

      if (html) el.innerHTML = html;
      else el.style.display = 'none';
    }).catch(() => { const el=$('daily-extras'); if(el) el.style.display='none'; });

  } catch(e) {

let _searchSource = '', _searchQuery = '', _searchDebounce = null;

function renderSearch() {
  setTopbar('Search', 'Browse your knowledge base');

  $('content').innerHTML = `
    <div class="search-wrap fade-up">
      <div style="position:relative;margin-bottom:14px;">

          oninput="_debounceSearch(this.value)"

          style="width:100%;padding:11px 48px 11px 16px;border:1.5px solid var(--border-mid);border-radius:14px;font-family:var(--font);font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s;"
          onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px rgba(193,68,14,0.10)'"
          onblur="this.style.borderColor='var(--border-mid)';this.style.boxShadow='none'">
        <span id="search-debounce-dot" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);display:none;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;"></span>
        <svg style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;" id="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/></svg>
      </div>
      <div class="search-filter-bar">
        ${['','notes','canvas','books','calendar','web'].map(s => {
          const labels = {'':'All', notes:'📝 Notes', canvas:'🎓 Canvas', books:'📚 Books', calendar:'📅 Calendar', web:'🌐 Web'};
          return `<button class="search-filter-btn${s===''?' active':''}" id="sfbtn-${s||'all'}" onclick="_setSearchSource('${s}')">${labels[s]}</button>`;
        }).join('')}
      </div>
      <div id="search-results"><div class="search-empty-state"><p>Type to search across your knowledge base.</p></div></div>
    </div>`;
  setTimeout(() => { const el=$('search-inp'); if(el) el.focus(); }, 50);
}

function _debounceSearch(val) {
  const dot = $('search-debounce-dot'), icon = $('search-icon');
  if (dot) dot.style.display = 'block';
  if (icon) icon.style.display = 'none';
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => {
    if (dot) dot.style.display = 'none';
    if (icon) icon.style.display = '';
    _doSearch(val, _searchSource, 0);
  }, 300);
}

function _setSearchSource(src) {
  _searchSource = src;
  document.querySelectorAll('.search-filter-btn').forEach(b => b.classList.remove('active'));
  const active = $('sfbtn-' + (src || 'all')); if (active) active.classList.add('active');
  const q = ($('search-inp') || {}).value || _searchQuery;
  if (q.trim()) _doSearch(q, src, 0);
}

function _highlightQuery(text, query) {
  if (!query) return text;
  const words = query.trim().split(/\s+/).filter(w=>w.length>2).map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if (!words.length) return text;
  const re = new RegExp('(' + words.join('|') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

async function _doSearch(q, source, offset) {
  q = q.trim();
  _searchQuery = q;
  const wrap = $('search-results'); if (!wrap) return;
  if (!q) {
    wrap.innerHTML = '<div class="search-empty-state"><p>Type to search across your knowledge base.</p></div>';
    return;
  }
  if (offset === 0) wrap.innerHTML = '<div style="padding:12px 0;">' + loading('Searching…') + '</div>';
  try {
    const params = new URLSearchParams({q, n:'8', offset: String(offset)});
    if (source) params.set('source', source);
    const data = await fetch('/search?' + params).then(r=>r.json());
    const results = data.results || [];
    if (results.length === 0 && offset === 0) {
      wrap.innerHTML = `<div class="search-empty-state"><p>No results for <strong>${esc(q)}</strong>.</p></div>`;
      return;
    }
    const srcDotClass = s => 'source-dot source-dot-' + (s || 'default');
    const cardsHtml = results.map(r => {
      const icon = ICONS[r.source] || '📄';
      const preview = _highlightQuery(esc((r.content_preview || r.content || '').slice(0,320)), q);
      const askQ = JSON.stringify('Tell me more about ' + (r.title || q));
      return `<div class="search-result-card" onclick="quickAsk(${askQ});setMode('ask');">
        <div class="search-result-header">
          <div class="search-result-title">${icon} ${esc(r.title || 'Untitled')}</div>
          ${r.composite_score ? `<div class="search-score-badge">${Math.round(r.composite_score*100)}%</div>` : ''}
        </div>
        <div class="search-result-meta">
          <div class="${srcDotClass(r.source)}"></div>
          <span class="search-result-source">${esc((r.source||'').replace(/_/g,' '))}</span>
          ${r.date ? `<span class="search-result-source">· ${esc(r.date)}</span>` : ''}
        </div>
        <div class="search-result-snippet">${preview}</div>
      </div>`;
    }).join('');
    if (offset === 0) {
      const meta = data.total ? `<div class="search-count">${data.total} result${data.total===1?'':'s'}</div>` : '';
      wrap.innerHTML = meta + '<div id="search-cards">' + cardsHtml + '</div>' + (data.has_more ? `<div style="text-align:center;margin-top:16px;"><button onclick="_doSearch(${JSON.stringify(q)},${JSON.stringify(source)},${offset+8})" style="padding:8px 22px;border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13px;background:transparent;cursor:pointer;color:var(--text-2);">Load more</button></div>` : '');
    } else {
      const cards = $('search-cards'); if (cards) cards.insertAdjacentHTML('beforeend', cardsHtml);
    }
  } catch(e) {
    if (offset === 0) wrap.innerHTML = '<div style="color:var(--danger);padding:12px 0;font-size:13px;">Search failed — is the server running?</div>';
  }
}

async function _loadLibrary(shelf) {
  const grid = $('lib-grid'); if (grid) grid.innerHTML = '<div style="padding:20px;">' + loading('Loading library…') + '</div>';
  try {
    const url = shelf ? `/library?shelf=${encodeURIComponent(shelf)}` : '/library';
    _libraryData = await api(url);
    _renderLibGrid(_libraryData.books || [], _libSearchQuery);

    const c = _libraryData.counts || {};

function _libShelf(shelf) {

function _renderLibGrid(books, q) {
  const grid = $('lib-grid'); if (!grid) return;
  const filtered = q ? books.filter(b=>(b.title||'').toLowerCase().includes(q.toLowerCase())||(b.author||'').toLowerCase().includes(q.toLowerCase())) : books;
  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px 0;color:var(--text-3);">' + (q ? `No books match "${esc(q)}"` : 'No books yet. Sync your Readwise or add books.') + '</div>';
    return;
  }
  const palettes = ['#6b7280','#7c3aed','#0e7490','#b45309','#be185d','#166534'];
  const bg = title => palettes[(title||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%palettes.length];
  const initials = title => (title||'?').split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
  const statusColors = {read:'#2d8a4e',reading:'#c1440e',want:'#d97706'};
  const typeIcon = (b) => b.source==='kindle'?'📚':b.source==='readwise'?'📖':b.source==='goodreads'?'📗':'📘';
  grid.innerHTML = filtered.map(b=>{
    const bgClr = bg(b.title);
    const init = initials(b.title);
    const dotClr = statusColors[b.status?.toLowerCase()] || statusColors[(b.status||'').toLowerCase().includes('read') ? 'read' : (b.status||'').toLowerCase().includes('reading') ? 'reading' : ''] || '#aeaeb2';
    const coverUrl = b.cover_url || `https://covers.openlibrary.org/b/title/${encodeURIComponent(b.title)}-M.jpg`;
    const bj = encodeURIComponent(JSON.stringify(b));
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;"
      onmouseover="this.style.boxShadow='var(--shadow-md)';this.style.borderColor='var(--border-mid)'"
      onmouseout="this.style.boxShadow='none';this.style.borderColor='var(--border)'"
      onclick='_openBookModal(JSON.parse(decodeURIComponent("${bj}")));'>
      <div style="position:relative;">
        <img src="${esc(coverUrl)}" alt="" loading="lazy" style="width:100%;height:160px;object-fit:cover;display:block;"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;width:100%;height:160px;background:linear-gradient(135deg,${bgClr}dd,${bgClr}88);flex-direction:column;align-items:center;justify-content:center;gap:4px;">
          <span style="font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px;">${init}</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.75);text-align:center;padding:0 8px;">${esc((b.title||'').slice(0,25))}</span>
        </div>
        <div style="position:absolute;top:6px;right:6px;font-size:13px;" title="${esc(b.source||'')}">${typeIcon(b)}</div>
        ${b.status ? `<div style="position:absolute;bottom:6px;left:6px;display:flex;align-items:center;gap:3px;background:rgba(0,0,0,0.65);border-radius:100px;padding:2px 7px;">
          <span style="width:5px;height:5px;border-radius:50%;background:${dotClr};flex-shrink:0;"></span>
          <span style="font-size:10px;color:#fff;font-weight:600;">${esc(b.status)}</span>
        </div>` : ''}
      </div>
      <div style="padding:10px 12px;">
        <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;">${esc(b.title)}</div>
        ${b.author ? `<div style="font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(b.author)}</div>` : ''}
        ${b.rating ? `<div style="font-size:11px;color:#d97706;margin-top:2px;">${'⭐'.repeat(b.rating)}</div>` : ''}
      </div>
    </div>`;
  }).join('');

// ── URL ────────────────────────────────────────────────────────────────────────
function renderURL() {
  setTopbar('Add URL', 'Save a web page to your knowledge base');
  hideInput();
  $('content').innerHTML = `
    <div style="max-width:660px;margin:0 auto;padding:36px 24px 60px;" class="fade-up">
      <div style="margin-bottom:20px;">
        <label style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;">URL</label>
        <input id="url-inp" type="url" placeholder="https://…"
          style="width:100%;padding:10px 14px;border:1.5px solid var(--border-mid);border-radius:var(--radius);font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-mid)'"
          onkeydown="if(event.key==='Enter') _submitURL()">
      </div>
      <button onclick="_submitURL()" class="btn btn-primary" style="padding:10px 24px;">Save URL</button>
      <div id="url-status" style="margin-top:14px;font-size:13px;"></div>
    </div>`;
  setTimeout(() => { const el=$('url-inp'); if(el) el.focus(); }, 50);
}

async function _submitURL() {
  const url = ($('url-inp')||{}).value||'';
  if (!url.trim()) { $('url-status').innerHTML = '<span style="color:var(--danger);">Please enter a URL.</span>'; return; }
  $('url-status').innerHTML = loading('Saving…');
  try {
    await api('/ingest/url', {method:'POST', body: JSON.stringify({url})});
    $('url-status').innerHTML = '<span style="color:var(--success);">URL saved!</span>';
    $('url-inp').value = '';
  } catch(e) {
    $('url-status').innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
  }
}

// ── FILE ───────────────────────────────────────────────────────────────────────
function renderFile() {
  setTopbar('Add File', 'Upload a file to your knowledge base');
  hideInput();
  $('content').innerHTML = `
    <div style="max-width:660px;margin:0 auto;padding:36px 24px 60px;" class="fade-up">
      <div style="margin-bottom:20px;">
        <label style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;">File</label>
        <input id="file-inp" type="file"
          style="width:100%;padding:10px 14px;border:1.5px solid var(--border-mid);border-radius:var(--radius);font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none;">
      </div>
      <button onclick="_submitFile()" class="btn btn-primary" style="padding:10px 24px;">Upload File</button>
      <div id="file-status" style="margin-top:14px;font-size:13px;"></div>
    </div>`;
}

async function _submitFile() {
  const inp = $('file-inp');
  if (!inp || !inp.files || !inp.files[0]) { $('file-status').innerHTML = '<span style="color:var(--danger);">Please select a file.</span>'; return; }
  $('file-status').innerHTML = loading('Uploading…');
  try {
    const fd = new FormData();
    fd.append('file', inp.files[0]);
    const r = await fetch('/ingest/file', {method:'POST', body: fd});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || `Error ${r.status}`);
    $('file-status').innerHTML = '<span style="color:var(--success);">File uploaded!</span>';
    inp.value = '';
  } catch(e) {
    $('file-status').innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
  }
}

// ── STATUS ─────────────────────────────────────────────────────────────────────
async function renderStatus() {
  setTopbar('Status', 'Server health and ingestion stats');
  hideInput();
  $('content').innerHTML = `<div style="max-width:720px;margin:0 auto;padding:28px 24px 60px;" class="fade-up"><div id="status-body">${loading('Loading status…')}</div></div>`;
  try {
    const [status, stats] = await Promise.all([api('/status'), api('/ingest/stats').catch(()=>null)]);
    const chunks = status.total_chunks || status.chunks || 0;
    const bySource = status.sources || status.chunks_by_source || status.by_source || {};
    let html = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Total Chunks</div>
          <div style="font-size:28px;font-weight:700;color:var(--text);">${chunks.toLocaleString()}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Server</div>
          <div style="font-size:18px;font-weight:700;color:var(--success);">Connected</div>
        </div>
      </div>`;
    if (Object.keys(bySource).length) {
      html += `<div style="margin-bottom:28px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;">Chunks by Source</div>
        ${Object.entries(bySource).sort((a,b)=>b[1]-a[1]).map(([src,cnt])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:14px;color:var(--text);">${esc(src)}</span>
            <span style="font-size:14px;font-weight:600;color:var(--text-2);">${cnt.toLocaleString()}</span>
          </div>`).join('')}
      </div>`;
    }
    if (stats) {
      const statEntries = Object.entries(stats).filter(([k])=>k!=='status');
      if (statEntries.length) {
        html += `<div>
          <div style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;">Ingestion Stats</div>
          ${statEntries.map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
              <span style="font-size:14px;color:var(--text);">${esc(k.replace(/_/g,' '))}</span>
              <span style="font-size:14px;font-weight:600;color:var(--text-2);">${typeof v==='number'?v.toLocaleString():esc(String(v))}</span>
            </div>`).join('')}
        </div>`;
      }
    }
    $('status-body').innerHTML = html;
  } catch(e) {
    $('status-body').innerHTML = `<div style="color:var(--danger);padding:12px 0;">${esc(e.message)}</div>`;
  }
}

        <div style="font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;">Connection</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start;margin-bottom:14px;">
          <div style="background:var(--surface-2);border-radius:8px;padding:12px;">
            <div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Recent</div>
            <div style="font-size:13.5px;color:var(--text);line-height:1.5;">${esc(sp.recent_item||'')}</div>
          </div>
          <div style="color:var(--text-3);font-size:20px;padding-top:14px;">⟷</div>
          <div style="background:var(--surface-2);border-radius:8px;padding:12px;">
            <div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Older</div>
